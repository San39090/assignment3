<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Validation</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
</head>
<body>
    <div id="error"></div>
    <div class="form">
        <h1 class="title">Form Validation</h1>
        <div class="group">
            <label class="info" for="Email">Enter your Email:</label>
            <input class="box" type="text" id="Email" name="Email">
        </div>
        <div class="group">
            <label class="info" for="phone">Enter your mobile number:</label>
            <input class="box" type="text" id="phone" name="phone">
        </div>
        <div class="group">
            <label class="info" for="password">Enter your password:</label>
            <input class="box" type="password" id="password" name="password">
        </div>
        <div class="group">
            <label class="info" for="repassword">Reenter your password:</label>
            <input class="box" type="password" name="repassword" id="repassword">
        </div>
        <input class="button" id="button" type="button" value="submit">
    </div>
    <script src="script.js"></script>
</body>
</html>
